name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  studio-typecheck:
    name: Studio LP / typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  hitotsu-typecheck:
    name: hitotsu / typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/hitotsu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/hitotsu/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
